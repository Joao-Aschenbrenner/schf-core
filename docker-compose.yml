services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schf-backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./storage:/var/www/html/storage
    ports:
      - "9000:9000"
    depends_on:
      - mysql
      - redis
    networks:
      - schf-network
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-schf}
      - DB_USERNAME=${DB_USERNAME:-schf}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: schf-frontend
    restart: unless-stopped
    ports:
      - "1420:1420"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - schf-network
    environment:
      - VITE_API_URL=http://localhost:9080/api

  nginx:
    image: nginx:alpine
    container_name: schf-nginx
    restart: unless-stopped
    ports:
      - "9080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend/public:/var/www/html/public
    depends_on:
      - backend
      - frontend
    networks:
      - schf-network

  mysql:
    image: mysql:8.0
    container_name: schf-mysql
    restart: unless-stopped
    ports:
      - "13306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-schf}
      MYSQL_USER: ${DB_USERNAME:-schf}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${MYSQL_ROOT_PASSWORD}}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./backups:/backups
    networks:
      - schf-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: schf-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    networks:
      - schf-network
    command: redis-server --requirepass ${REDIS_PASSWORD}

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schf-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      - mysql
      - redis
    networks:
      - schf-network
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-schf}
      - DB_USERNAME=${DB_USERNAME:-schf}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: schf-pma
    restart: unless-stopped
    ports:
      - "9081:80"
    depends_on:
      - mysql
    networks:
      - schf-network
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306

networks:
  schf-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:


