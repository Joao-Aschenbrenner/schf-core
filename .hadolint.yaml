  - DL3013  # Pin versions in pip
  - DL3018  # Pin versions in apk add
  - DL3015  # Avoid additional packages in apt-get

trustedRegistries:
  - docker.io
  - gcr.io

override:
  warning:
    - DL3025  # Use JSON form for CMD
    - DL3045  # COPY with --chown
